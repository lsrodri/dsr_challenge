# ──────────────────────────────────────────────────────────────────────────────
# 1) feature‐only pipeline factory
# ──────────────────────────────────────────────────────────────────────────────
def build_feature_pipeline(config):
    return Pipeline(
        [
            ("imputer_city", CityBasedImputer(city_column=config["city_col"])),
            ("city_sel", CitySelector(city=None)),
            ("drop1", DropColumnsTransformer(columns_to_drop=config["drop_cols1"])),
            ("drop2", DropColumnsTransformer(columns_to_drop=config["drop_cols2"])),
            (
                "cycle",
                CyclicTransformer(
                    column=config["cycle_col"],
                    period=config["period"],
                    drop_original=True,
                ),
            ),
            ("outlier", OutlierRemover(**config["outlier_cfg"])),
            ("imputer", SimpleImputer(strategy="mean")),
            ("scaler", StandardScaler()),
        ]
    )


# ──────────────────────────────────────────────────────────────────────────────
# 2) two‐stage run for one city
# ──────────────────────────────────────────────────────────────────────────────
from sklearn.model_selection import cross_validate, TimeSeriesSplit
from sklearn.metrics import make_scorer, f1_score


from sklearn.model_selection import cross_validate, TimeSeriesSplit
from sklearn.metrics import make_scorer, f1_score


from sklearn.ensemble import RandomForestClassifier, RandomForestRegressor
from sklearn.metrics import make_scorer, f1_score
from sklearn.model_selection import cross_validate, TimeSeriesSplit


def run_city_experiment_hurdle(city_code, df_train, df_test, config):
    X = df_train.drop(columns="total_cases")
    y = df_train["total_cases"]
    is_pos = (y > 0).astype(int)

    tscv = TimeSeriesSplit(n_splits=config["cv_folds"])

    # Stage 1: classifier CV
    clf_pipe = Pipeline(
        [
            ("features", build_feature_pipeline(config)),
            ("clf", RandomForestClassifier(n_estimators=100, random_state=0)),
        ]
    )
    clf_scores = cross_validate(
        clf_pipe,
        X,
        is_pos,
        cv=tscv,
        scoring={"accuracy": "accuracy", "f1": make_scorer(f1_score)},
        return_train_score=True,
    )
    print(f"\n--- City={city_code} :: CLASSIFIER CV ---")
    print(
        f" train_acc: {clf_scores['train_accuracy'].mean():.3f} "
        f" val_acc: {clf_scores['test_accuracy'].mean():.3f}"
    )
    print(
        f" train_f1 : {clf_scores['train_f1'].mean():.3f} "
        f" val_f1 : {clf_scores['test_f1'].mean():.3f}"
    )

    # Stage 2: regressor CV on positive weeks
    X_pos, y_pos = X[is_pos == 1], y[is_pos == 1]
    reg_pipe = Pipeline(
        [
            ("features", build_feature_pipeline(config)),
            ("reg", ExtraTreesRegressor(n_estimators=100, random_state=0)),
        ]
    )
    reg_scores = cross_validate(
        reg_pipe,
        X_pos,
        y_pos,
        cv=tscv,
        scoring=("r2", "neg_mean_squared_error", "neg_mean_absolute_error"),
        return_train_score=True,
    )
    print(f"\n--- City={city_code} :: REGRESSOR CV (y>0) ---")
    print(
        f" train_R2 : {reg_scores['train_r2'].mean():.3f} "
        f" val_R2 : {reg_scores['test_r2'].mean():.3f}"
    )
    print(
        f" train_MSE: {-reg_scores['train_neg_mean_squared_error'].mean():.3f} "
        f" val_MSE: {-reg_scores['test_neg_mean_squared_error'].mean():.3f}"
    )
    print(
        f" train_MAE: {-reg_scores['train_neg_mean_absolute_error'].mean():.3f} "
        f" val_MAE: {-reg_scores['test_neg_mean_absolute_error'].mean():.3f}"
    )

    # Fit on full data
    clf_pipe.fit(X, is_pos)
    reg_pipe.fit(X_pos, y_pos)

    # Predict
    X_test = df_test.copy()
    p_nonzero = clf_pipe.predict_proba(X_test)[:, 1]
    y_reg_log = reg_pipe.predict(X_test)

    thr = config.get("prob_threshold", 0.5)
    y_pred_log = np.where(p_nonzero < thr, 0.0, y_reg_log)

    y_pred = np.expm1(y_pred_log).round().astype(int)
    sub = df_test[["city", "year", "weekofyear"]].copy()
    sub["total_cases"] = y_pred
    return sub


# ──────────────────────────────────────────────────────────────────────────────
# 3) main
# ──────────────────────────────────────────────────────────────────────────────
def main():
    # load & merge train
    feats = pd.read_csv("src/data/raw/dengue_features_train.csv")
    labs = pd.read_csv("src/data/raw/dengue_labels_train.csv")
    df = feats.merge(labs, on=["city", "year", "weekofyear"], how="inner")
    df["total_cases"] = np.log1p(df["total_cases"])

    # load test
    test = pd.read_csv("src/data/raw/dengue_features_test.csv")

    submissions = []
    for city in df["city"].unique():
        df_tr = df[df["city"] == city].reset_index(drop=True)
        df_te = test[test["city"] == city].reset_index(drop=True)
        submissions.append(run_city_experiment_hurdle(city, df_tr, df_te, CONFIG))

    # stitch back in original test order
    final = pd.concat(submissions, axis=0)
    out = test[["city", "year", "weekofyear"]].copy()
    lookup = {
        (r.city, r.year, r.weekofyear): r.total_cases for _, r in final.iterrows()
    }
    out["total_cases"] = out.apply(
        lambda r: lookup[(r.city, r.year, r.weekofyear)], axis=1
    )

    out.to_csv("src/data/predictions/hurdle_submission.csv", index=False)
    print("✅ Wrote hurdle_submission.csv")


if __name__ == "__main__":
    main()



# main.py

import sys
from pathlib import Path

# allow imports from src/
sys.path.append(str(Path(__file__).resolve().parent / "src"))

import pandas as pd
import numpy as np

from sklearn.pipeline import Pipeline
from sklearn.impute import SimpleImputer
from sklearn.preprocessing import StandardScaler
from sklearn.ensemble import RandomForestClassifier, RandomForestRegressor
from sklearn.model_selection import TimeSeriesSplit, cross_validate
from sklearn.metrics import make_scorer, f1_score

from transformers.transformers_l import DropColumnsTransformer, CityBasedImputer
from transformers.custom_transformers_mine import (
    CitySelector,
    CyclicTransformer,
    OutlierRemover,
)

# ──────────────────────────────────────────────────────────────────────────────
# CONFIG
# ──────────────────────────────────────────────────────────────────────────────
CONFIG = {
    "drop_cols1": [
        "week_start_date",
        "reanalysis_sat_precip_amt_mm",
        "reanalysis_dew_point_temp_k",
        "ndvi_nw",
        "ndvi_se",
        "reanalysis_air_temp_k",
        "reanalysis_tdtr_k",
    ],
    "drop_cols2": ["city"],
    "city_col": "city",
    "cycle_col": "weekofyear",
    "period": 52,
    "outlier_cfg": {
        "columns": [
            "ndvi_ne",
            "ndvi_nw",
            "ndvi_se",
            "ndvi_sw",
            "precipitation_amt_mm",
            "reanalysis_air_temp_k",
            "reanalysis_avg_temp_k",
            "reanalysis_max_air_temp_k",
            "reanalysis_min_air_temp_k",
            "reanalysis_precip_amt_kg_per_m2",
            "reanalysis_relative_humidity_percent",
            "reanalysis_specific_humidity_g_per_kg",
            "reanalysis_tdtr_k",
            "station_avg_temp_c",
            "station_diur_temp_rng_c",
            "station_max_temp_c",
            "station_min_temp_c",
            "station_precip_mm",
        ],
        "remove": False, 
        "method": "zscore",
        "threshold": 3.0,
    },
    "cv_folds": 5,
    "hurdle_threshold": 0.5,
}


def build_feature_pipe(cfg):
    """Shared preprocessing for both classifier and regressor."""
    return Pipeline(
        [
            ("imputer_city", CityBasedImputer(city_column=cfg["city_col"])),
            ("city_sel", CitySelector(city=None)),
            ("drop1", DropColumnsTransformer(columns_to_drop=cfg["drop_cols1"])),
            ("drop2", DropColumnsTransformer(columns_to_drop=cfg["drop_cols2"])),
            (
                "cycle",
                CyclicTransformer(
                    column=cfg["cycle_col"], period=cfg["period"], drop_original=True
                ),
            ),
            ("outlier", OutlierRemover(**cfg["outlier_cfg"])),
            ("imputer_final", SimpleImputer(strategy="mean")),
            ("scaler", StandardScaler()),
        ]
    )


def main():
    # 1) Load & merge training data
    feats = pd.read_csv("src/data/raw/dengue_features_train.csv")
    labels = pd.read_csv("src/data/raw/dengue_labels_train.csv")
    df = feats.merge(labels, on=["city", "year", "weekofyear"], how="inner")

    # The classifier target: zero vs non-zero
    df["is_positive"] = (df["total_cases"] > 0).astype(int)
    # The regressor target (log scale) only for positive weeks
    df["total_cases_log"] = np.log1p(df["total_cases"])

    # Features and targets
    X = df.drop(columns=["total_cases", "total_cases_log", "is_positive"])
    y_clf = df["is_positive"]
    y_reg_full = df["total_cases_log"]
    # we'll only train regressor on positives
    pos_mask = y_clf == 1
    X_reg = X[pos_mask]
    y_reg = y_reg_full[pos_mask]

    # 2) TimeSeries CV
    tscv = TimeSeriesSplit(n_splits=CONFIG["cv_folds"])

    # ──────────────── Stage 1: Classifier ────────────────
    print("\n⏱ Stage 1: RandomForestClassifier (will there be any cases?)")
    clf_pipe = Pipeline(
        [
            ("features", build_feature_pipe(CONFIG)),
            ("clf", RandomForestClassifier(n_estimators=100, random_state=0)),
        ]
    )
    clf_res = cross_validate(
        clf_pipe,
        X,
        y_clf,
        cv=tscv,
        scoring={"f1": make_scorer(f1_score)},
        return_train_score=True,
        n_jobs=-1,
    )
    print(
        " ▶ train  F1:",
        clf_res["train_f1"].mean().round(3),
        " val  F1:",
        clf_res["test_f1"].mean().round(3),
    )

    # ──────────────── Stage 2: Regressor ────────────────
    print("\n⏱ Stage 2: RandomForestRegressor (how many cases, if any?)")
    reg_pipe = Pipeline(
        [
            ("features", build_feature_pipe(CONFIG)),
            ("reg", RandomForestRegressor(n_estimators=100, random_state=0)),
        ]
    )
    reg_res = cross_validate(
        reg_pipe,
        X_reg,
        y_reg,
        cv=tscv,
        scoring=("r2", "neg_mean_squared_error", "neg_mean_absolute_error"),
        return_train_score=True,
        n_jobs=-1,
    )
    print(
        " ▶ train R2:",
        reg_res["train_r2"].mean().round(3),
        " val R2:",
        reg_res["test_r2"].mean().round(3),
    )
    print(
        " ▶ train MSE:",
        (-reg_res["train_neg_mean_squared_error"].mean()).round(3),
        " val MSE:",
        (-reg_res["test_neg_mean_squared_error"].mean()).round(3),
    )
    print(
        " ▶ train MAE:",
        (-reg_res["train_neg_mean_absolute_error"].mean()).round(3),
        " val MAE:",
        (-reg_res["test_neg_mean_absolute_error"].mean()).round(3),
    )

    # 3) Fit both on full training set
    clf_pipe.fit(X, y_clf)
    reg_pipe.fit(X_reg, y_reg)

    # 4) Load & preprocess test set
    df_test = pd.read_csv("src/data/raw/dengue_features_test.csv")
    X_test = df_test.copy()

    # 5) Predict
    p_pos = clf_pipe.predict_proba(X_test)[:, 1]
    y_reg_log = reg_pipe.predict(X_test)
    # hurdle threshold
    mask = p_pos >= CONFIG["hurdle_threshold"]
    y_pred_log = np.where(mask, y_reg_log, 0.0)
    y_pred = np.expm1(y_pred_log).round().astype(int)

    # 6) Build submission
    submission = df_test[["city", "year", "weekofyear"]].copy()
    submission["total_cases"] = y_pred
    submission.to_csv("src/data/predictions/hurdle_both_cities.csv", index=False)
    print("\n✅ Wrote submission to src/data/predictions/hurdle_both_cities.csv")


if __name__ == "__main__":
    main()
